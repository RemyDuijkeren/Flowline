---
name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      checks: write
      packages: write
      id-token: write  # enable GitHub OIDC token issuance for this job

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'
        env:
          NUGET_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: 💾 Restore dependencies
        run: dotnet restore

      - name: ⚙️ Build
        run: dotnet build -c Release --no-restore
        env:
          MINVERBUILDMETADATA: build.${{github.run_id}}.${{github.run_attempt}}

      - name: 🚦 Test
        id: test
        run: dotnet test -c Release -l trx --results-directory ./artifacts/ --no-build
        env:
          DATAVERSE_CONNECTION_OPTIONS: ${{secrets.DATAVERSE_CONNECTION_OPTIONS}}

      - name: 📋 Test reporter
        uses: dorny/test-reporter@v3
        if: always() && steps.test.outcome != 'skipped'
        with:
          name: unittests
          path: ./artifacts/*.trx
          reporter: dotnet-trx

      - name: 📦 Pack
        run: dotnet pack -c Release -o ./artifacts/ --no-build

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{secrets.NUGET_USER}}

      - name: 🚀 Push to NuGet
        run: dotnet nuget push **/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json

      - name: 🚀 Push to GitHub
        run: |
          dotnet nuget add source --username RemyDuijkeren --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push ./artifacts/*.nupkg -k ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
