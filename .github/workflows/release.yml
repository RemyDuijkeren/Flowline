---
name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  build:
    permissions:
      checks: write
      packages: write
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release
      id-token: write  # enable GitHub OIDC token issuance for NuGet login

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: 📥 Download packages
        uses: actions/download-artifact@v8
        with:
          name: nuget-packages
          path: ./artifacts/

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{secrets.NUGET_USER}}

      - name: 🚀 Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json

      - name: 📝 Extract release notes from CHANGELOG.md
        run: |
          awk -v ver="$GITHUB_REF_NAME" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            flag && /^## \[/ { flag=0 }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for [$GITHUB_REF_NAME] — aborting." >&2
            exit 1
          fi

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: false
